name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      # Ohne das cancelt ein Fehler auf einem OS die uebrigen Jobs, und deren
      # Ergebnis bleibt unbekannt.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      # uv sync loest ALLE Abhaengigkeiten aus uv.lock auf, inklusive der
      # oeffentlichen Git-Libs textual-themes und textual-widgets. Die frueher
      # hier gepflegte pip-Liste hat die beiden ausgelassen, weshalb jeder Test,
      # der ein textual-widgets-Widget importiert, beim Sammeln abbrach.
      - name: Sync dependencies (uv)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run poe lint

      - name: Tests (pytest)
        run: uv run poe test
